name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: corepack enable
      - run: corepack prepare pnpm@11.10.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:architecture
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm test:playground
      - run: pnpm smoke:packages
      - run: npm pack --dry-run
